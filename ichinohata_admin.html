<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>一の旗 管理者設定</title>
<style>
  :root{--ink:#1b2333;--teal:#0b7a8c;--teal-dark:#086374;--vermilion:#c0392b;--cream:#f7f4ec;--line:#e3ddcf;}
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100%;font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;color:var(--ink);background:var(--cream);}
  header{background:var(--teal);color:#fff;padding:12px 18px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.18);}
  header .mark{font-size:20px;}
  header h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.04em;}
  .wrap{max-width:480px;margin:0 auto;padding:24px 18px 60px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px 20px;box-shadow:0 4px 14px rgba(0,0,0,.08);margin-bottom:18px;}
  .card h2{font-size:14px;margin:0 0 14px;color:var(--teal-dark);}
  label{display:block;font-size:12.5px;color:#7a7568;font-weight:600;margin:14px 0 5px;}
  input{width:100%;font-size:15px;border:1px solid var(--line);border-radius:9px;padding:11px 13px;font-family:inherit;}
  .row{display:flex;gap:12px;}
  .row > div{flex:1;}
  .unit{font-size:12px;color:#9a927f;margin-top:4px;}
  .btn{width:100%;margin-top:20px;padding:13px;font-size:15px;font-weight:700;background:var(--teal);color:#fff;border:none;border-radius:9px;cursor:pointer;font-family:inherit;}
  .btn:hover{background:var(--teal-dark);}
  .btn:disabled{opacity:.55;cursor:default;}
  .msg{font-size:13px;margin-top:12px;min-height:18px;text-align:center;}
  .msg.ok{color:var(--teal-dark);font-weight:700;}
  .msg.err{color:var(--vermilion);}
  .hint{font-size:11.5px;color:#9a927f;line-height:1.7;margin-top:6px;}
  .saved-at{font-size:11px;color:#aaa;margin-top:10px;text-align:right;}
  /* 合言葉ゲート */
  #gate{position:fixed;inset:0;background:linear-gradient(160deg,#0b7a8c,#064a55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  #gate.hidden{display:none;}
  .gate-card{background:#fff;border-radius:16px;padding:30px 28px;width:330px;max-width:100%;box-shadow:0 12px 44px rgba(0,0,0,.35);}
  .gate-logo{font-weight:700;font-size:19px;color:var(--ink);}
  .gate-sub{color:#8a8372;font-size:13px;margin:6px 0 18px;}
  #gate input{margin-top:4px;}
  .gate-err{color:var(--vermilion);font-size:13px;margin-top:10px;min-height:18px;}
</style>
</head>
<body>

<div id="gate">
  <div class="gate-card">
    <div class="gate-logo">🔒 一の旗 管理者設定</div>
    <p class="gate-sub">管理者用の合言葉を入力してください</p>
    <input id="gate-pass" type="password" placeholder="合言葉" autocomplete="off">
    <button class="btn" id="gate-btn" style="margin-top:16px;">開く</button>
    <div id="gate-err" class="gate-err"></div>
  </div>
</div>

<header>
  <span class="mark">⚙️</span>
  <h1>一の旗 管理者設定</h1>
</header>

<div class="wrap">
  <div class="card">
    <h2>⛽ 出張買取の燃料設定</h2>
    <p class="hint">ここで設定した数字を使って、インバウンドマップのルート検索で燃料代を計算します。全スタッフの画面に反映されます。</p>
    <div class="row">
      <div>
        <label>トラックの燃費</label>
        <input id="f-kmpl" type="number" step="0.1" min="0" inputmode="decimal">
        <div class="unit">km/L（1リットルで走る距離）</div>
      </div>
      <div>
        <label>軽油の単価</label>
        <input id="f-yen" type="number" step="1" min="0" inputmode="numeric">
        <div class="unit">円/L（1リットルの値段）</div>
      </div>
    </div>
    <button class="btn" id="save-btn">保存する</button>
    <div id="msg" class="msg"></div>
    <div id="saved-at" class="saved-at"></div>
  </div>
  <div class="card">
    <h2>📎 参考の目安</h2>
    <p class="hint">
      ・トヨタ・ダイナ（ディーゼル）の実燃費は、街乗り・積載ありで <b>7〜8km/L</b> あたりが目安です。<br>
      ・軽油の全国平均は <b>160円前後</b>（時期で変動します）。<br>
      ・正確にしたいときは、満タン給油で「走った距離 ÷ 入れたリットル数」を計算して燃費を出すと実態に合います。
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://prldqlylkqrbwduybcpw.supabase.co';
const SUPABASE_KEY='sb_publishable_YQFRvwddrR0_8Bgmn2EZ_g_zNOHZ74V';
const ADMIN_PASS='master';  // 管理者用の合言葉（変えたいときはこの文字を書き換える）
let sb=null;

function openGate(){
  var pass=(document.getElementById('gate-pass').value||'');
  var err=document.getElementById('gate-err');
  if(pass!==ADMIN_PASS){ err.textContent='合言葉が違います'; return; }
  document.getElementById('gate').classList.add('hidden');
  loadSettings();
}
function fmtTime(iso){
  try{ var d=new Date(iso); return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
  catch(e){ return ''; }
}
async function loadSettings(){
  var msg=document.getElementById('msg'); msg.className='msg'; msg.textContent='';
  try{
    var res=await sb.from('ichinohata_settings').select('fuel_kmpl,fuel_yen,updated_at').eq('id',1).single();
    if(res.error){ throw res.error; }
    document.getElementById('f-kmpl').value=res.data.fuel_kmpl;
    document.getElementById('f-yen').value=res.data.fuel_yen;
    if(res.data.updated_at){ document.getElementById('saved-at').textContent='最終更新：'+fmtTime(res.data.updated_at); }
  }catch(e){
    msg.className='msg err'; msg.textContent='設定の読み込みに失敗しました。通信状態をご確認ください。';
  }
}
async function saveSettings(){
  var kmpl=parseFloat(document.getElementById('f-kmpl').value);
  var yen=parseFloat(document.getElementById('f-yen').value);
  var msg=document.getElementById('msg'); msg.className='msg'; msg.textContent='';
  if(!(kmpl>0)){ msg.className='msg err'; msg.textContent='燃費は0より大きい数字を入れてください'; return; }
  if(!(yen>0)){ msg.className='msg err'; msg.textContent='単価は0より大きい数字を入れてください'; return; }
  var btn=document.getElementById('save-btn'); btn.disabled=true; btn.textContent='保存中…';
  try{
    var res=await sb.from('ichinohata_settings').update({fuel_kmpl:kmpl, fuel_yen:yen, updated_at:new Date().toISOString()}).eq('id',1);
    if(res.error){ throw res.error; }
    msg.className='msg ok'; msg.textContent='✅ 保存しました。全スタッフの画面に反映されます。';
    document.getElementById('saved-at').textContent='最終更新：'+fmtTime(new Date().toISOString());
  }catch(e){
    msg.className='msg err'; msg.textContent='保存に失敗しました。もう一度お試しください。';
  }finally{
    btn.disabled=false; btn.textContent='保存する';
  }
}
window.addEventListener('DOMContentLoaded',function(){
  sb=window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  document.getElementById('gate-btn').addEventListener('click', openGate);
  document.getElementById('gate-pass').addEventListener('keydown', function(e){ if(e.key==='Enter') openGate(); });
  document.getElementById('save-btn').addEventListener('click', saveSettings);
});
</script>
</body>
</html>
