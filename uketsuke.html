<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>リサマイマップ</title>
<style>
  :root{--ink:#1b2333;--teal:#0b7a8c;--teal-dark:#086374;--vermilion:#c0392b;--cream:#f7f4ec;--line:#e3ddcf;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;color:var(--ink);}
  #app{display:flex;flex-direction:column;height:100%;}
  header{background:var(--teal);color:#fff;padding:10px 18px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.18);z-index:5;flex-wrap:wrap;}
  header .mark{font-size:20px;}
  header h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.04em;}
  header .spacer{margin-left:auto;}
  header .navbtn{background:rgba(255,255,255,.16);color:#fff;border:none;cursor:pointer;font-family:inherit;font-size:12px;padding:5px 12px;border-radius:999px;text-decoration:none;display:inline-block;}
  header .navbtn:hover{background:rgba(255,255,255,.30);}
  #toolbar{background:#fff;border-bottom:1px solid var(--line);padding:9px 18px;display:flex;gap:9px;align-items:center;flex-wrap:wrap;z-index:4;}
  #q{flex:1;min-width:200px;max-width:380px;font-size:14px;border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-family:inherit;}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:#5b6671;}
  .chip.on{background:var(--teal);border-color:var(--teal);color:#fff;}
  #hits{font-size:12.5px;color:#8a8372;margin-left:auto;}
  #wrap{position:relative;flex:1;min-height:0;}
  #map{position:absolute;inset:0;background:#e8eaed;}
  .iw{font-family:inherit;min-width:170px;padding:2px 2px 4px;}
  .iw-cat{display:inline-block;color:#fff;font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;margin-bottom:6px;margin-right:4px;}
  .iw-name{font-size:15px;font-weight:700;line-height:1.3;}
  .iw-pref{font-size:12px;color:#555;margin-bottom:3px;}
  .iw-co{font-size:13px;margin-top:2px;}
  .iw-meta{font-size:13px;color:#1b2333;margin-top:6px;line-height:1.85;}
  .iw-bigmeta{font-size:14.5px;color:#1b2333;margin-top:7px;line-height:1.6;font-weight:600;}
  .iw-bigmeta b{color:var(--teal-dark);}
  .iw-meta b{color:var(--teal-dark);}
  .iw-ng{color:#c0392b;}
  .iw-code{font-size:11px;color:#aaa;margin-top:2px;}
  .iw-photo{display:block;max-width:172px;width:100%;border-radius:6px;margin-top:8px;}
  .iw-route{display:inline-block;margin-top:9px;background:var(--teal);color:#fff;font-size:12.5px;font-weight:700;padding:7px 13px;border-radius:8px;text-decoration:none;}
  #err{position:absolute;inset:0;display:none;align-items:center;justify-content:center;padding:30px;text-align:center;background:var(--cream);z-index:10;}
  #err .box{max-width:430px;font-size:14px;line-height:1.8;color:#4a4438;}
  #err b{color:var(--vermilion);}
  #login-overlay{position:fixed;inset:0;background:linear-gradient(160deg,#0b7a8c,#064a55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  #login-overlay.hidden{display:none;}
  .login-card{background:#fff;border-radius:16px;padding:30px 28px;width:340px;max-width:100%;box-shadow:0 12px 44px rgba(0,0,0,.35);}
  .login-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:20px;color:var(--ink);}
  .login-sub{color:#8a8372;font-size:13px;margin:6px 0 18px;}
  .login-label{display:block;font-size:12px;color:#7a7568;font-weight:600;margin:12px 0 4px;}
  #login-overlay input{width:100%;font-size:14px;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-family:inherit;}
  .login-btn{width:100%;margin-top:20px;padding:12px;font-size:15px;font-weight:700;background:var(--teal);color:#fff;border:none;border-radius:9px;cursor:pointer;}
  .login-btn:hover{background:var(--teal-dark);}
  .login-error{color:var(--vermilion);font-size:13px;margin-top:10px;min-height:18px;}
  .panel{position:absolute;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,.14);}
  #legend{top:12px;right:12px;width:212px;padding:10px 12px 8px;font-size:12.5px;max-height:calc(100% - 24px);overflow:auto;z-index:3;}
  #legend h2{font-size:11.5px;margin:0 0 7px;color:#6b6456;letter-spacing:.06em;font-weight:700;cursor:pointer;user-select:none;}
  #legend .gl{font-size:11px;color:#9a927f;margin:0 0 3px 2px;}
  #legend.min .grp{display:none;}
  .grp{margin-bottom:9px;}
  .leg{display:flex;align-items:center;gap:8px;padding:3px 6px;border-radius:6px;cursor:pointer;user-select:none;}
  .leg:hover{background:#f3f0e8;}
  .leg.off{opacity:.36;}
  .sw{height:28px;width:26px;object-fit:contain;flex:none;display:block;}
  .leg .nm{flex:1;}
  .leg .ct{color:#8a8372;font-variant-numeric:tabular-nums;}
  #routepanel{left:12px;bottom:38px;width:256px;padding:12px;z-index:3;font-size:12.5px;}
  #routepanel h2{font-size:12.5px;margin:0 0 4px;color:#086374;font-weight:700;cursor:move;user-select:none;}
  #routepanel h2::before{content:"⠿ ";color:#b9b3a4;font-size:13px;}
  #routepanel .rhint{font-size:10.5px;color:#9a927f;margin:0 0 4px;line-height:1.5;}
  #routepanel.min .rbody{display:none;}
  #routepanel label{display:block;font-size:11px;color:#7a7568;font-weight:600;margin:7px 0 3px;}
  #routepanel input{width:100%;font-size:13px;border:1px solid var(--line);border-radius:7px;padding:7px 9px;font-family:inherit;}
  #routepanel .rbtns{display:flex;gap:7px;margin-top:10px;}
  .rhome{display:flex;gap:6px;}
  .rhome input{flex:1;min-width:0;}
  .rhome button{flex:none;border:none;border-radius:7px;padding:0 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--teal);color:#fff;}
  .rhome button:hover{background:var(--teal-dark);}
  .rsep{border-top:1px dashed var(--line);margin:10px 0 4px;}
  .rchk{display:flex;align-items:center;gap:6px;font-size:11.5px;color:#7a7568;margin-top:8px;cursor:pointer;}
  #routepanel input[type=checkbox]{width:auto;margin:0;}
  #r-dests input{margin-bottom:5px;}
  #r-add{border:1px dashed var(--teal);background:#fff;color:var(--teal-dark);border-radius:8px;padding:6px 0;width:100%;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit;}
  #r-add:hover{background:#e8f4f6;}
  #r-result .leg-line{font-size:12px;font-weight:600;color:#3f5a60;line-height:1.7;}
  #r-result .leg-cost{font-size:11px;color:#8a8372;line-height:1.5;margin-bottom:2px;}
  #r-result .total-line{margin-top:3px;border-top:1px dashed var(--line);padding-top:4px;}
  #routepanel .rbtns button{flex:1;border:none;border-radius:8px;padding:8px 0;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;}
  #r-go{background:var(--teal);color:#fff;}
  #r-go:hover{background:var(--teal-dark);}
  #r-go:disabled{opacity:.55;cursor:default;}
  #r-clear{background:#eee;color:#555;}
  #r-result{margin-top:9px;font-size:13.5px;font-weight:700;color:#086374;min-height:18px;line-height:1.55;}
  #r-result .sub{font-weight:400;color:#8a8372;font-size:11.5px;}
  .iw-origin{display:inline-block;margin-top:9px;margin-left:6px;background:#fff;border:1.5px solid var(--teal);color:var(--teal-dark);font-size:12.5px;font-weight:700;padding:6px 11px;border-radius:8px;cursor:pointer;font-family:inherit;}
  .iw-origin:hover{background:#e8f4f6;}
</style>
</head>
<body>

<div id="login-overlay">
  <div class="login-card">
    <div class="login-logo">📞 リサマイマップ</div>
    <p class="login-sub">社内（インバウンド）専用・ログインしてください</p>
    <label class="login-label">メールアドレス</label>
    <input id="login-email" type="email" autocomplete="username" placeholder="staff@example.com">
    <label class="login-label">パスワード</label>
    <input id="login-pass" type="password" autocomplete="current-password" placeholder="パスワード">
    <button class="login-btn" id="login-btn">ログイン</button>
    <div id="login-error" class="login-error"></div>
  </div>
</div>

<div id="app">
  <header>
    <span class="mark">📞</span>
    <h1>リサマイマップ</h1>
    <span class="spacer"></span>
    <button class="navbtn" id="logout-btn">ログアウト</button>
  </header>
  <div id="toolbar">
    <input id="q" type="text" placeholder="🔍 店名・都道府県・会社名で検索（Enterで地図ジャンプ）">
    <span id="hits"></span>
  </div>
  <div id="wrap">
    <div id="map"></div>
    <div class="panel" id="legend"></div>
    <div class="panel" id="routepanel">
      <h2 id="route-h">🚚 出張買取ルート検索</h2>
      <div class="rbody">
        <label>出発地（バイヤーの現在地・店など）</label>
        <input id="r-from" type="text" placeholder="例：東京都板橋区◯◯（直前のお宅）">
        <label>行き先（上から順に回ります）</label>
        <div id="r-dests"></div>
        <button id="r-add" type="button">＋ 行き先を追加</button>
        <label class="rchk"><input type="checkbox" id="r-etc" checked> ETC料金で高速代を計算</label>
        <div class="rbtns"><button id="r-go">ルート表示</button><button id="r-clear">クリア</button></div>
        <div id="r-result"></div>
        <div class="rsep"></div>
        <label>🏠 お客様宅を見る（住所だけで確認）</label>
        <div class="rhome">
          <input id="h-addr" type="text" placeholder="例：東京都豊島区西池袋◯◯">
          <button id="h-go" type="button">表示</button>
        </div>
        <div class="rhint">表示後、左上の「航空写真」で建物や駐車スペースを確認できます</div>
      </div>
    </div>
    <div id="err"><div class="box" id="errmsg"></div></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
let STORES = [];
const SUPABASE_URL='https://prldqlylkqrbwduybcpw.supabase.co';
const SUPABASE_KEY='sb_publishable_YQFRvwddrR0_8Bgmn2EZ_g_zNOHZ74V';
const PHOTO_BUCKET='store-photos';
function photoUrl(id){return SUPABASE_URL+'/storage/v1/object/public/'+PHOTO_BUCKET+'/'+id+'.jpg';}
const CATS = {
  '本社':    {color:'#6b3fa0', group:'自社のお店（RM）',  shape:'castle-big', label:'本社'},
  '支店':    {color:'#1f3a6e', group:'自社のお店（RM）',  shape:'castle',     label:'支店'},
  'ショップ':{color:'#2e7d32', group:'自社のお店（RM）',  shape:'shop',       label:'ショップ'},
  '両方OK':  {color:'#1565c0', group:'提携先のお店（FS）', shape:'nobori',   label:'両方OK'},
  '来店のみ':{color:'#f4b400', group:'提携先のお店（FS）', shape:'nobori',   label:'来店のみ'},
  '両方NG':  {color:'#c62828', group:'提携先のお店（FS）', shape:'nobori',   label:'両方NG'},
  '架電合意':{color:'#8a8f98', group:'一の旗（架電連動）', shape:'nobori',    label:'取引合意（開店前）'}
};
const CAT_ORDER = ['本社','支店','ショップ','両方OK','来店のみ','両方NG','架電合意'];
const GROUPS = ['自社のお店（RM）','提携先のお店（FS）','一の旗（架電連動）'];
const FLAG_STATUSES = ['取引合意','書類準備中','締結','新設届出中'];
const STROKE='#2b2b2b';
function enc(svg){return 'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg);}
function wrap(w,h,inner){return '<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">'+inner+'</svg>';}
function pennantInner(c){return '<line x1="7" y1="5" x2="7" y2="34" stroke="'+STROKE+'" stroke-width="2.4" stroke-linecap="round"/><path d="M7 6 L25 11 L7 16.5 Z" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.3" stroke-linejoin="round"/><circle cx="7" cy="34" r="2.6" fill="'+STROKE+'"/>';}
function shopInner(c){return '<line x1="7" y1="5" x2="7" y2="34" stroke="'+STROKE+'" stroke-width="2.4" stroke-linecap="round"/><path d="M7 6 L24 6 L19.5 11 L24 16 L7 16 Z" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.3" stroke-linejoin="round"/><circle cx="7" cy="34" r="2.6" fill="'+STROKE+'"/>';}
function noboriInner(c){return '<line x1="6" y1="3" x2="6" y2="37" stroke="'+STROKE+'" stroke-width="2.4" stroke-linecap="round"/><path d="M6 4 L21 4 L21 25 L6 25 Z" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.2" stroke-linejoin="round"/><circle cx="6" cy="3" r="2.3" fill="#d4af37" stroke="'+STROKE+'" stroke-width="0.8"/><circle cx="6" cy="37" r="2.5" fill="'+STROKE+'"/>';}
function castleInner(c){return '<path d="M5 34 L25 34 L22 28 L8 28 Z" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.2" stroke-linejoin="round"/><rect x="9" y="21.5" width="12" height="6.7" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.1"/><path d="M5 22.5 L15 15.5 L25 22.5 Z" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.1" stroke-linejoin="round"/><rect x="11.7" y="12" width="6.6" height="4.5" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.1"/><path d="M8.5 13 L15 7.8 L21.5 13 Z" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.1" stroke-linejoin="round"/><rect x="14.2" y="5.5" width="1.6" height="2.6" fill="'+STROKE+'"/>';}
function bigCastleInner(c){return '<path d="M3 40 L29 40 L26 33 L6 33 Z" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.3" stroke-linejoin="round"/><rect x="7.5" y="26" width="17" height="7" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.2"/><path d="M3.5 27 L16 19.5 L28.5 27 Z" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.2" stroke-linejoin="round"/><rect x="10" y="15.5" width="12" height="5.5" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.2"/><path d="M6.5 16.5 L16 10 L25.5 16.5 Z" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.2" stroke-linejoin="round"/><rect x="12.5" y="7" width="7" height="3.8" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.1"/><path d="M9.5 7.8 L16 2.8 L22.5 7.8 Z" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.1" stroke-linejoin="round"/><rect x="15.2" y="0.6" width="1.7" height="2.6" fill="#d4af37"/>';}
function innerFor(shape,color){
  if(shape==='castle-big') return wrap(32,42,bigCastleInner(color));
  if(shape==='castle')     return wrap(30,38,castleInner(color));
  if(shape==='shop')       return wrap(30,38,shopInner(color));
  if(shape==='nobori')     return wrap(28,40,noboriInner(color));
  return wrap(30,38,pennantInner(color));
}
function shapeSVG(cat){ var d=CATS[cat]||{shape:'pennant',color:'#888'}; return innerFor(d.shape, d.color); }
function iconFor(cat){
  var c=(CATS[cat]||{color:'#888'}).color;
  if(cat==='本社')    return {url:enc(wrap(32,42,bigCastleInner(c))),scaledSize:new google.maps.Size(37,48),anchor:new google.maps.Point(18.5,45.7)};
  if(cat==='支店')    return {url:enc(wrap(30,38,castleInner(c))),   scaledSize:new google.maps.Size(30,38),anchor:new google.maps.Point(15,34)};
  if(cat==='ショップ')return {url:enc(wrap(30,38,shopInner(c))),     scaledSize:new google.maps.Size(30,38),anchor:new google.maps.Point(7,34)};
  if(cat==='架電合意') return {url:enc(wrap(28,40,noboriInner(c))),scaledSize:new google.maps.Size(31,44),anchor:new google.maps.Point(6.6,44)};
  return {url:enc(wrap(28,40,noboriInner(c))),scaledSize:new google.maps.Size(31,44),anchor:new google.maps.Point(6.6,44)};
}
function esc(t){return (t||'').replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]);});}
function mapsLink(s){
  var q=[s.name,s.pref].join(' ');
  return 'https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(s.lat+','+s.lng);
}
let map, info, storeMarkers=[], flagMarkers=[];
let fRaiten=false, fShutcho=false;
let shown={}; CAT_ORDER.forEach(function(c){shown[c]=true;});
let routeOrigin=null, routePolys=[], routeMarkers=[];
function initMap(){
  map=new google.maps.Map(document.getElementById('map'),{center:{lat:37.8,lng:137.5},zoom:5,mapTypeControl:true,streetViewControl:true,fullscreenControl:true,gestureHandling:'greedy'});
  pano=map.getStreetView();
  pano.setOptions({addressControl:false, fullscreenControl:false, motionTracking:false, motionTrackingControl:false, enableCloseButton:true});
  info=new google.maps.InfoWindow();
  var bounds=new google.maps.LatLngBounds();
  STORES.forEach(function(s){
    var m=new google.maps.Marker({position:{lat:s.lat,lng:s.lng},map:map,title:s.name,icon:iconFor(s.cat)});
    m.addListener('click',function(){info.setContent(infoHTML(s));info.open(map,m);});
    m._store=s; storeMarkers.push(m);
    bounds.extend(m.getPosition());
  });
  if(!bounds.isEmpty()) map.fitBounds(bounds);
  buildLegend();
  applyFilter();
  loadFlags();
  loadFuelSettings();
  document.getElementById('q').addEventListener('input',applyFilter);
  document.getElementById('q').addEventListener('keydown',function(e){ if(e.key==='Enter') zoomToHits(); });
  enablePanelDrag();
  document.getElementById('r-go').addEventListener('click',runRoute);
  document.getElementById('r-clear').addEventListener('click',function(){
    clearRouteDrawing();
    clearHomeMarker();
    document.getElementById('r-result').innerHTML='';
    document.getElementById('h-addr').value='';
    document.getElementById('r-dests').innerHTML='';
    addDestRow();
  });
  document.getElementById('r-from').addEventListener('input',function(){ routeOrigin=null; });
  document.getElementById('r-add').addEventListener('click',function(){ var el=addDestRow(); if(el) el.focus(); });
  document.getElementById('h-go').addEventListener('click',showHome);
  document.getElementById('h-addr').addEventListener('keydown',function(e){ if(e.key==='Enter') showHome(); });
  addDestRow();
}
function isMaru(v){ return '◯〇○'.indexOf((v||'').trim())>=0; }
function matches(s,q){
  if(fRaiten){ if(s.group==='FS' && !isMaru(s.raiten)) return false; }
  if(fShutcho){ if(s.group==='FS' && !isMaru(s.shutcho)) return false; }
  if(q){
    var hay=(s.name+' '+s.pref+' '+(s.city||'')+' '+(s.address||'')+' '+(s.company||'')+' '+(s.tanto||'')).toLowerCase();
    var terms=q.toLowerCase().split(/\s+/).filter(Boolean);
    for(var i=0;i<terms.length;i++){ if(hay.indexOf(terms[i])<0) return false; }
  }
  return true;
}
function applyFilter(){
  var q=(document.getElementById('q').value||'').trim();
  var n=0;
  storeMarkers.forEach(function(m){
    var ok=shown[m._store.cat]!==false && matches(m._store,q);
    m.setMap(ok?map:null); if(ok)n++;
  });
  document.getElementById('hits').textContent=n+' / '+STORES.length+' 店';
}
function buildAddress(s){
  var pref=(s.pref||'').trim(), city=(s.city||'').trim(), addr=(s.address||'').trim();
  if(!addr){ return esc([pref,city].filter(Boolean).join('')); }
  // 住所が既に県名から始まっていれば、そのまま使う（自社店など）
  if(pref && addr.indexOf(pref)===0){ return esc(addr); }
  // 住所が市区町村から始まっていれば、県名だけ前に付ける
  if(city && addr.indexOf(city)===0){ return esc(pref+addr); }
  // それ以外（FS店：町名から始まる）は 県＋市区町村＋住所 をつなげる
  return esc(pref+city+addr);
}
function infoHTML(s){
  var c=CATS[s.cat]||{color:'#888'};
  var region=buildAddress(s);
  var rows='';
  function line(html){ rows+='<div class="iw-meta">'+html+'</div>'; }
  if(s.group==='FS'){
    // ② 来店買取／出張対応（大きく）
    var ok='◯〇○';
    var rOK=(ok.indexOf((s.raiten||'').trim())>=0);
    var sOK=(ok.indexOf((s.shutcho||'').trim())>=0);
    var r=rOK?'<b>来店買取 ◯</b>':'<span class="iw-ng">来店買取 '+(esc(s.raiten)||'✕')+'</span>';
    var sh=sOK?'<b>出張所 ◯</b>':'<span class="iw-ng">出張所 '+(esc(s.shutcho)||'✕')+'</span>';
    rows+='<div class="iw-bigmeta">'+r+'　／　'+sh+'</div>';
    // ③ 電話番号（目立つ位置）

function geocodeOne(geocoder, addr){
  return new Promise(function(resolve){
    geocoder.geocode({address:addr, region:'JP'}, function(results,status){
      if(status==='OK' && results && results[0]){ var l=results[0].geometry.location; resolve({lat:l.lat(), lng:l.lng()}); }
      else { resolve(null); }
    });
  });
}
function sleep(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }
async function loadFlags(){
  if(!sb) return;
  try{
    var res = await sb.from('ichinohata').select('id,company,prefecture,city,address,status,phone').in('status', FLAG_STATUSES);
    if(res.error || !res.data){ return; }
    var geocoder = new google.maps.Geocoder();
    for(var i=0;i<res.data.length;i++){
      var p=res.data[i];
      var addr=[p.address,p.prefecture,p.city,p.company].filter(Boolean).join(' ');
      if(!addr) continue;
      var key='ichgeo:'+addr, pos=null, wasCached=false;
      try{ var cv=localStorage.getItem(key); if(cv){ pos=JSON.parse(cv); wasCached=true; } }catch(e){}
      if(!pos){ pos=await geocodeOne(geocoder, addr); if(pos){ try{ localStorage.setItem(key, JSON.stringify(pos)); }catch(e){} } }
      if(!pos){ continue; }
      var cat=flagCat(p.status);
      var m=new google.maps.Marker({position:pos, map:(shown[cat]?map:null), title:(p.company||''), icon:iconFor(cat)});
      m._cat=cat;
      (function(pp,cc,mk){ mk.addListener('click',function(){ info.setContent(flagInfoHTML(pp,cc)); info.open(map,mk); }); })(p,cat,m);
      flagMarkers.push(m);
      if(!wasCached){ await sleep(160); }
    }
    buildLegend();
  }catch(e){}
}
function updateFlagVisibility(){
  flagMarkers.forEach(function(m){ m.setMap(shown[m._cat]?map:null); });
}
function buildLegend(){
  var counts={}; CAT_ORDER.forEach(function(c){counts[c]=0;});
  STORES.forEach(function(s){ if(counts[s.cat]!==undefined) counts[s.cat]++; });
  flagMarkers.forEach(function(m){ if(counts[m._cat]!==undefined) counts[m._cat]++; });
  var html='<h2 id="legend-h">凡例（クリックで表示切替）</h2>';
  GROUPS.forEach(function(g){
    html+='<div class="grp"><div class="gl">'+g+'</div>';
    CAT_ORDER.filter(function(c){return CATS[c].group===g;}).forEach(function(c){
      html+='<div class="leg'+(shown[c]?'':' off')+'" data-cat="'+c+'"><img class="sw" src="'+enc(shapeSVG(c))+'"><span class="nm">'+CATS[c].label+'</span><span class="ct">'+(counts[c]||0)+'</span></div>';
    });
    html+='</div>';
  });
  var el=document.getElementById('legend'); el.innerHTML=html;
  el.querySelector('#legend-h').addEventListener('click',function(){ el.classList.toggle('min'); });
  el.querySelectorAll('.leg').forEach(function(row){
    row.addEventListener('click',function(){
      var c=row.dataset.cat; shown[c]=!shown[c]; row.classList.toggle('off',!shown[c]);
      applyFilter(); updateFlagVisibility();
    });
  });
}

}

function enablePanelDrag(){
  var panel=document.getElementById('routepanel');
  var handle=document.getElementById('route-h');
  var wrap=document.getElementById('wrap');
  var dragging=false, moved=false, sx=0, sy=0, ox=0, oy=0;
  handle.addEventListener('mousedown', function(e){
    dragging=true; moved=false;
    var pr=panel.getBoundingClientRect(), wr=wrap.getBoundingClientRect();
    ox=pr.left-wr.left; oy=pr.top-wr.top;
    sx=e.clientX; sy=e.clientY;
    // 位置をtop/leftで固定する（bottom指定を解除）
    panel.style.left=ox+'px'; panel.style.top=oy+'px'; panel.style.right='auto'; panel.style.bottom='auto';
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e){
    if(!dragging) return;
    var dx=e.clientX-sx, dy=e.clientY-sy;
    if(Math.abs(dx)>3||Math.abs(dy)>3) moved=true;
    var wr=wrap.getBoundingClientRect();
    var nx=Math.max(0, Math.min(ox+dx, wr.width-panel.offsetWidth));
    var ny=Math.max(0, Math.min(oy+dy, wr.height-panel.offsetHeight));
    panel.style.left=nx+'px'; panel.style.top=ny+'px';
  });
  document.addEventListener('mouseup', function(){
    if(dragging && !moved){ panel.classList.toggle('min'); } // 動かさずクリック＝折りたたみ
    dragging=false;
  });
}

function mkNumPoint(pos,num){

    icon:{path:google.maps.SymbolPath.CIRCLE, scale:13, fillColor:'#0b7a8c', fillOpacity:1, strokeColor:'#ffffff', strokeWeight:2.5},
    label:{text:String(num), color:'#ffffff', fontSize:'13px', fontWeight:'700'}});

async function runRoute(){
  var fromTxt=(document.getElementById('r-from').value||'').trim();
  var dests=[];
  document.querySelectorAll('#r-dests input').forEach(function(el){
    var v=(el.value||'').trim(); if(v) dests.push(v);
  });
  var out=document.getElementById('r-result');
  if((!routeOrigin && !fromTxt) || !dests.length){ out.innerHTML='<span class="sub">出発地と行き先を入れてください</span>'; return; }
  var btn=document.getElementById('r-go'); btn.disabled=true; btn.textContent='計算中…';
  out.innerHTML='<span class="sub">ルートを計算しています…</span>';
  clearRouteDrawing();
  try{
    var lib=await google.maps.importLibrary('routes');
    var origin=routeOrigin? routeOrigin : fromTxt;
    var dest=dests[dests.length-1];
    var mids=dests.slice(0,-1);
    var common={origin:origin, destination:dest, travelMode:'DRIVING', region:'jp'};
    if(mids.length) common.intermediates=mids;
    var mods={vehicleInfo:{emissionType:'GASOLINE'}};
    if(document.getElementById('r-etc').checked){ mods.tollPasses=['JP_ETC','JP_ETC2']; }
    var res;
    try{
      res=await lib.Route.computeRoutes(Object.assign({}, common, {
        extraComputations:['TOLLS'],
        routeModifiers:mods,
        fields:['path','distanceMeters','durationMillis','legs','travelAdvisory']
      }));
    }catch(e1){
      try{
        res=await lib.Route.computeRoutes(Object.assign({}, common, {fields:['path','distanceMeters','durationMillis','legs']}));
      }catch(e2){
        res=await lib.Route.computeRoutes(Object.assign({}, common, {fields:['path']}));
      }
    }
    var routes=res && res.routes;
    if(!routes || !routes.length || !routes[0].path || !routes[0].path.length){
      out.innerHTML='<span class="sub">ルートが見つかりませんでした。住所の表記を見直してください</span>'; return;
    }
    var r=routes[0];
    routePolys=r.createPolylines();
    routePolys.forEach(function(p){ p.setMap(map); });
    var path=r.path;
    routeMarkers.push(mkRoutePoint(path[0],'🚚'));
    // 各行き先に番号ピン（住所をジオコーディングして立てる）
    var geocoder=new google.maps.Geocoder();
    for(var i=0;i<dests.length;i++){
      var pos=await geocodeOne(geocoder, dests[i]);
      if(pos){ routeMarkers.push(mkNumPoint(pos, i+1)); }
    }
    var b=new google.maps.LatLngBounds(); path.forEach(function(pt){ b.extend(pt); }); map.fitBounds(b);
    var isEtc=document.getElementById('r-etc').checked;
    // 1つの脚(leg)から高速代を取り出すヘルパー
    function legToll(lg){
      try{
        var ta=lg && lg.travelAdvisory; if(!ta) return null;
        var ti=ta.tollInfo; if(!ti) return 0;
        var pr=ti.estimatedPrice||ti.estimatedPrices;
        if(pr && pr.length){ var p=pr[0]; return Math.round(Number(p.units||0)+(p.nanos? p.nanos/1e9 : 0)); }
        return null; // 高速ありだが金額不明
      }catch(e){ return null; }
    }
    // 区間ごとの時間・距離・コスト（複数行き先のとき）
    var html='';
    var legs=r.legs;
    if(legs && legs.length===dests.length && dests.length>1){
      for(var j=0;j<legs.length;j++){
        var lg=legs[j], seg='';
        if(lg && typeof lg.durationMillis==='number'){ seg+='約'+fmtDur(Math.round(lg.durationMillis/60000)); }
        if(lg && typeof lg.distanceMeters==='number'){ seg+=(seg?'（':'')+(lg.distanceMeters/1000).toFixed(1)+'km'+(seg?'）':''); }
        var fromLabel=(j===0)?'出発':(j+'件目');
        html+='<div class="leg-line">'+fromLabel+' → '+(j+1)+'件目　'+(seg||'—')+'</div>';
        // この区間のコスト内訳
        var costParts=[];
        if(lg && typeof lg.distanceMeters==='number' && fuelKmpl>0){
          var lf=Math.round((lg.distanceMeters/1000)/fuelKmpl*fuelYen);
          costParts.push('⛽￥'+lf.toLocaleString());
        }
        var lt=legToll(lg);
        if(lt!==null){ if(lt>0) costParts.push('💴￥'+lt.toLocaleString()); }
        else { costParts.push('💴(不明)'); }
        if(costParts.length){ html+='<div class="leg-cost">　└ '+costParts.join('　')+'</div>'; }
      }
    }
    var total='';
    if(typeof r.durationMillis==='number'){ total+='🚗 合計 約'+fmtDur(Math.round(r.durationMillis/60000)); }
    if(typeof r.distanceMeters==='number'){ total+=(total?'（':'')+(r.distanceMeters/1000).toFixed(1)+'km'+(total?'）':''); }
    if(total){ html+='<div class="total-line">'+total+'</div>'; }
    // 全体の高速料金（取得できた場合）
    var tollYen=null;
    try{
      var ta=r.travelAdvisory;
      if(ta){
        var ti=ta.tollInfo;
        var prices=ti? (ti.estimatedPrice||ti.estimatedPrices) : null;
        if(prices && prices.length){
          var p0=prices[0];
          tollYen=Math.round(Number(p0.units||0)+(p0.nanos? p0.nanos/1e9 : 0));
          html+='<div class="leg-line">💴 高速代 約￥'+tollYen.toLocaleString()+(isEtc?'（ETC）':'（現金）')+'</div>';
        } else if(ti){
          html+='<div class="leg-line">💴 高速道路を通ります（料金を取得できませんでした）</div>';
        } else {
          tollYen=0;
          html+='<div class="leg-line">💴 高速代なし（一般道のみ）</div>';
        }
      }
    }catch(eToll){}
    // 燃料代（距離 ÷ 燃費 × 単価）とコスト合計
    var fuelYenCost=null;
    if(typeof r.distanceMeters==='number' && fuelKmpl>0){
      fuelYenCost=Math.round((r.distanceMeters/1000)/fuelKmpl*fuelYen);
      html+='<div class="leg-line">⛽ 燃料代 約￥'+fuelYenCost.toLocaleString()+'<span class="sub">（'+fuelKmpl+'km/L・'+fuelYen+'円/L）</span></div>';
    }
    if(fuelYenCost!==null && tollYen!==null){
      var grand=fuelYenCost+tollYen;
      html+='<div class="total-line">💰 コスト合計 約￥'+grand.toLocaleString()+'</div>';
    }
    out.innerHTML = html ? html+'<div class="sub">※移動時間のみ。買取の滞在時間は含みません</div>' : 'ルートを表示しました';
  }catch(e){
    out.innerHTML='<span class="sub">ルートを計算できませんでした。住所の表記、またはGoogle Cloudの「Routes API」の有効化をご確認ください</span>';
  }finally{
    btn.disabled=false; btn.textContent='ルート表示';
  }
}

}
