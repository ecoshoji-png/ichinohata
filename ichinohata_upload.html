<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>一の旗 写真アップロード</title>
<style>
  :root{--ink:#1b2333;--indigo:#22304f;--vermilion:#c0392b;--cream:#f7f4ec;--line:#e3ddcf;--ok:#2e7d32;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;color:var(--ink);background:var(--cream);}
  header{background:var(--indigo);color:#fff;padding:13px 20px;display:flex;align-items:center;gap:10px;}
  header .mark{color:#f4b9ad;font-size:20px;}
  header h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.03em;}
  header .accent{color:#f4b9ad;}
  .wrap{max-width:680px;margin:0 auto;padding:22px 18px 60px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:18px;box-shadow:0 2px 10px rgba(0,0,0,.05);}
  .step{font-size:12px;color:#9a927f;font-weight:700;letter-spacing:.08em;margin-bottom:8px;}
  h2{font-size:15px;margin:0 0 12px;}
  input[type=text],input[type=password]{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;}
  .list{max-height:260px;overflow:auto;border:1px solid var(--line);border-radius:8px;margin-top:10px;}
  .row{padding:9px 12px;border-bottom:1px solid #f0ece2;cursor:pointer;display:flex;align-items:center;gap:8px;}
  .row:last-child{border-bottom:none;}
  .row:hover{background:#f6f3ec;}
  .row.sel{background:#eef3fb;}
  .badge{font-size:10.5px;color:#fff;padding:1px 7px;border-radius:999px;flex:none;}
  .badge.light{color:#1b2333;border:1px solid #2b2b2b;}
  .row .nm{flex:1;font-size:13.5px;}
  .row .pf{font-size:11px;color:#999;flex:none;}
  .selbox{display:flex;gap:14px;align-items:center;margin-top:4px;}
  .selbox .now{flex:1;}
  .now .nm{font-size:16px;font-weight:700;}
  .now .sub{font-size:12px;color:#777;}
  .ph{width:104px;height:104px;border-radius:8px;border:1px solid var(--line);object-fit:cover;background:#f3f0e8;flex:none;}
  .nophoto{width:104px;height:104px;border-radius:8px;border:1px dashed #cbc4b4;display:flex;align-items:center;justify-content:center;color:#b3ab98;font-size:11px;text-align:center;flex:none;}
  .filebtn{display:inline-block;background:#eef0f5;border:1px solid var(--line);border-radius:8px;padding:10px 14px;cursor:pointer;font-size:14px;}
  #file{display:none;}
  #preview{max-width:100%;max-height:260px;border-radius:8px;margin-top:12px;display:none;}
  .upbtn{width:100%;margin-top:14px;background:var(--vermilion);color:#fff;border:none;border-radius:9px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;}
  .upbtn:disabled{background:#c9b4af;cursor:default;}
  .status{margin-top:12px;font-size:13.5px;min-height:18px;}
  .status.ok{color:var(--ok);font-weight:700;}
  .status.err{color:var(--vermilion);}
  .muted{font-size:11.5px;color:#9a927f;margin-top:6px;line-height:1.5;}
  #overlay{position:fixed;inset:0;background:var(--indigo);display:flex;align-items:center;justify-content:center;z-index:50;}
  #overlay .box{background:#fff;border-radius:12px;padding:26px;width:320px;text-align:center;}
  #overlay h3{margin:0 0 14px;font-size:16px;}
  #overlay button{margin-top:12px;width:100%;background:var(--indigo);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;}
  #passErr{color:var(--vermilion);font-size:12.5px;margin-top:8px;min-height:16px;}
</style>
</head>
<body>
<div id="overlay">
  <div class="box">
    <h3>一の旗 写真アップロード</h3>
    <input type="password" id="passInput" placeholder="合言葉を入力" autocomplete="off">
    <div id="passErr"></div>
    <button id="passBtn">入る</button>
  </div>
</div>

<header><span class="mark">&#9730;</span><h1>一の旗 <span class="accent">写真アップロード</span></h1></header>
<div class="wrap">
  <div class="card">
    <div class="step">STEP 1</div>
    <h2>お店を選ぶ</h2>
    <input type="text" id="search" placeholder="店名・都道府県・会社名で検索（例：札幌、池袋本店）">
    <div class="list" id="list"></div>
  </div>

  <div class="card" id="selCard" style="display:none;">
    <div class="step">選択中のお店</div>
    <div class="selbox">
      <div class="now">
        <span class="badge" id="selBadge"></span>
        <div class="nm" id="selName"></div>
        <div class="sub" id="selSub"></div>
      </div>
      <div id="phWrap"></div>
    </div>
  </div>

  <div class="card" id="upCard" style="display:none;">
    <div class="step">STEP 2</div>
    <h2>写真を選んで、アップロード</h2>
    <label class="filebtn" for="file">パソコンから写真を選ぶ</label>
    <input type="file" id="file" accept="image/*">
    <img id="preview" alt="">
    <button class="upbtn" id="uploadBtn">この写真をアップロード</button>
    <div class="status" id="status"></div>
    <div class="muted">写真は自動で見やすいサイズに縮小して保存します。同じ店にもう一度上げると、新しい写真に置き換わります。</div>
  </div>
</div>

const CATCOLOR={'本社':'#6b3fa0','支店':'#1f3a6e','ショップ':'#2e7d32','両方OK':'#1565c0','来店のみ':'#f4b400','両方NG':'#c62828','取引合意':'#ffffff'};
let sb=null, selected=null;
function esc(t){return (t||'').replace(/[&<>]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]);});}
function pubUrl(id,bust){return SUPABASE_URL+'/storage/v1/object/public/'+BUCKET+'/'+id+'.jpg'+(bust?('?t='+Date.now()):'');}

document.getElementById('passBtn').addEventListener('click',tryPass);
document.getElementById('passInput').addEventListener('keydown',function(e){if(e.key==='Enter')tryPass();});
function tryPass(){
  if(document.getElementById('passInput').value===UPLOAD_PASS){
    document.getElementById('overlay').style.display='none'; initApp();
  } else { document.getElementById('passErr').textContent='合言葉が違います'; }
}
function initApp(){
  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  renderList('');
  document.getElementById('search').addEventListener('input',function(e){renderList(e.target.value);});
  document.getElementById('file').addEventListener('change',onFile);
  document.getElementById('uploadBtn').addEventListener('click',doUpload);
}
function renderList(q){
  q=(q||'').trim();
  var arr=STORES.filter(function(s){return !q || (s.name+s.pref+(s.company||'')).indexOf(q)>=0;});
  arr.sort(function(a,b){return (a.pref+a.name).localeCompare(b.pref+b.name,'ja');});
  var html=arr.slice(0,300).map(function(s){
    var c=CATCOLOR[s.cat]||'#888'; var light=(s.cat==='取引合意');
    return '<div class="row'+(selected&&selected.id===s.id?' sel':'')+'" data-id="'+s.id+'">'
      +'<span class="badge '+(light?'light':'')+'" style="background:'+c+'">'+esc(s.cat)+'</span>'
      +'<span class="nm">'+esc(s.name)+'</span><span class="pf">'+esc(s.pref)+'</span></div>';
  }).join('');
  if(!arr.length) html='<div class="row" style="color:#999;cursor:default;">該当なし</div>';
  var el=document.getElementById('list'); el.innerHTML=html;
  el.querySelectorAll('.row[data-id]').forEach(function(r){r.addEventListener('click',function(){selectStore(r.dataset.id);});});
}
function selectStore(id){
  selected=STORES.find(function(s){return s.id===id;}); if(!selected) return;
  renderList(document.getElementById('search').value);
  var c=CATCOLOR[selected.cat]||'#888'; var light=(selected.cat==='取引合意');
  document.getElementById('selCard').style.display='';
  document.getElementById('upCard').style.display='';
  var b=document.getElementById('selBadge'); b.textContent=selected.cat; b.style.background=c;
  b.className='badge'+(light?' light':'');
  document.getElementById('selName').textContent=selected.name;
  document.getElementById('selSub').textContent=selected.pref+(selected.company?('　'+selected.company):'');
  var wrap=document.getElementById('phWrap');
  wrap.innerHTML='<img class="ph" id="curPhoto" alt="">';
  var img=document.getElementById('curPhoto');
  img.onerror=function(){wrap.innerHTML='<div class="nophoto">まだ写真<br>なし</div>';};
  img.src=pubUrl(selected.id,true);
  document.getElementById('status').textContent='';
  document.getElementById('status').className='status';
  document.getElementById('preview').style.display='none';
  document.getElementById('file').value='';
}
function onFile(e){
  var f=e.target.files[0]; var p=document.getElementById('preview');
  if(f){ p.src=URL.createObjectURL(f); p.style.display='block'; } else { p.style.display='none'; }
}
function resizeImage(file,maxDim,quality){
  return new Promise(function(resolve){
    var img=new Image();
    img.onload=function(){
      var w=img.width,h=img.height;
      if(Math.max(w,h)>maxDim){var r=maxDim/Math.max(w,h);w=Math.round(w*r);h=Math.round(h*r);}
      var cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cv.toBlob(function(b){resolve(b||file);},'image/jpeg',quality);
    };
    img.onerror=function(){resolve(file);};
    img.src=URL.createObjectURL(file);
  });
}
function setStatus(msg,kind){var s=document.getElementById('status');s.textContent=msg;s.className='status'+(kind?(' '+kind):'');}
async function doUpload(){
  if(!selected){setStatus('先にお店を選んでください','err');return;}
  var f=document.getElementById('file').files[0];
  if(!f){setStatus('写真を選んでください','err');return;}
  var btn=document.getElementById('uploadBtn'); btn.disabled=true; setStatus('アップロード中…','');
  try{
    var blob=await resizeImage(f,1600,0.85);
    var res=await sb.storage.from(BUCKET).upload(selected.id+'.jpg',blob,{upsert:true,contentType:'image/jpeg'});
    if(res.error){ setStatus('失敗：'+res.error.message,'err'); btn.disabled=false; return; }
    setStatus('アップロード成功！「'+selected.name+'」に写真を保存しました。','ok');
    var wrap=document.getElementById('phWrap'); wrap.innerHTML='<img class="ph" alt="">';
    wrap.firstChild.src=pubUrl(selected.id,true);
    document.getElementById('file').value=''; document.getElementById('preview').style.display='none';
  }catch(err){ setStatus('エラー：'+(err&&err.message?err.message:err),'err'); }
  btn.disabled=false;
}
