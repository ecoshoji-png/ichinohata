<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>一の旗 全国マップ</title>
<style>
  :root{--ink:#1b2333;--indigo:#22304f;--vermilion:#c0392b;--cream:#f7f4ec;--line:#e3ddcf;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;color:var(--ink);}
  #app{display:flex;flex-direction:column;height:100%;}
  header{background:var(--indigo);color:#fff;padding:10px 18px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.18);z-index:5;}
  header .mark{font-size:20px;color:#f4b9ad;}
  header h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.04em;}
  header .accent{color:#f4b9ad;}
  header .sub{font-size:12px;opacity:.8;margin-left:2px;}
  header .spacer{margin-left:auto;}
  header .total{font-size:13px;background:rgba(255,255,255,.12);padding:4px 11px;border-radius:999px;}
  header .navbtn{background:rgba(255,255,255,.16);color:#fff;border:none;cursor:pointer;font-family:inherit;font-size:12px;padding:5px 12px;border-radius:999px;text-decoration:none;display:inline-block;}
  header .navbtn:hover{background:rgba(255,255,255,.30);}
  #wrap{position:relative;flex:1;min-height:0;}
  #map{position:absolute;inset:0;background:#e8eaed;}
  .panel{position:absolute;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,.14);}
  #legend{top:12px;right:12px;width:218px;padding:12px 12px 8px;font-size:12.5px;max-height:calc(100% - 24px);overflow:auto;}
  #legend h2{font-size:11.5px;margin:0 0 7px;color:#6b6456;letter-spacing:.06em;font-weight:700;}
  #legend .gl{font-size:11px;color:#9a927f;margin:0 0 3px 2px;}
  .grp{margin-bottom:9px;}
  .leg{display:flex;align-items:center;gap:8px;padding:3px 6px;border-radius:6px;cursor:pointer;user-select:none;}
  .leg:hover{background:#f3f0e8;}
  .leg.off{opacity:.36;}
  .sw{height:28px;width:26px;object-fit:contain;flex:none;display:block;}
  .leg .nm{flex:1;}
  .leg .ct{color:#8a8372;font-variant-numeric:tabular-nums;}
  .iw{font-family:inherit;min-width:158px;padding:2px 2px 4px;}
  .iw-cat{display:inline-block;color:#fff;font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;margin-bottom:6px;}
  .iw-cat.light{color:#1b2333;border:1px solid #2b2b2b;}
  .iw-name{font-size:15px;font-weight:700;line-height:1.3;}
  .iw-pref{font-size:12px;color:#777;margin-bottom:3px;}
  .iw-co{font-size:13px;margin-top:2px;}
  .iw-meta{font-size:12px;color:#555;margin-top:5px;}
  .iw-deeds{margin-top:9px;padding-top:7px;border-top:1px dashed #d8cfc0;}
  .iw-deeds-h{font-size:11px;font-weight:700;color:#9a7b3f;letter-spacing:.06em;margin-bottom:4px;}
  .iw-deed{font-size:12.5px;color:#2b2b2b;line-height:1.75;}
  .iw-deed b{color:#b5532f;}
  .iw-sub{font-size:11px;color:#999;}
  .iw-code{font-size:11px;color:#aaa;margin-top:2px;}
  .iw-photo{display:block;max-width:172px;width:100%;border-radius:6px;margin-top:8px;}
  #err{position:absolute;inset:0;display:none;align-items:center;justify-content:center;padding:30px;text-align:center;background:var(--cream);z-index:10;}
  #err .box{max-width:430px;font-size:14px;line-height:1.8;color:#4a4438;}
  #err b{color:var(--vermilion);}
  #login-overlay{position:fixed;inset:0;background:linear-gradient(160deg,#22304f,#161f33);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  #login-overlay.hidden{display:none;}
  .login-card{background:#fff;border-radius:16px;padding:30px 28px;width:340px;max-width:100%;box-shadow:0 12px 44px rgba(0,0,0,.35);}
  .login-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:20px;color:var(--ink);}
  .login-logo .mk{color:var(--vermilion);font-size:22px;}
  .login-sub{color:#8a8372;font-size:13px;margin:6px 0 18px;}
  .login-label{display:block;font-size:12px;color:#7a7568;font-weight:600;margin:12px 0 4px;}
  #login-overlay input{width:100%;font-size:14px;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-family:inherit;}
  .login-btn{width:100%;margin-top:20px;padding:12px;font-size:15px;font-weight:700;background:var(--indigo);color:#fff;border:none;border-radius:9px;cursor:pointer;}
  .login-btn:hover{background:#2c3e64;}
  .login-error{color:var(--vermilion);font-size:13px;margin-top:10px;min-height:18px;}
</style>
</head>
<body>

<div id="login-overlay">
  <div class="login-card">
    <div class="login-logo"><span class="mk">&#9730;</span> 一の旗 全国マップ</div>
    <p class="login-sub">チーム専用・ログインしてください</p>
    <label class="login-label">メールアドレス</label>
    <input id="login-email" type="email" autocomplete="username" placeholder="staff@example.com">
    <label class="login-label">パスワード</label>
    <input id="login-pass" type="password" autocomplete="current-password" placeholder="パスワード">
    <button class="login-btn" id="login-btn">ログイン</button>
    <div id="login-error" class="login-error"></div>
  </div>
</div>

<div id="app">
  <header>
    <span class="mark">&#9730;</span>
    <h1>一の旗 <span class="accent">全国マップ</span></h1>
    <span class="sub">2026-05-25 時点</span>
    <span class="spacer"></span>
    <span class="total" id="total"></span>
    <a class="navbtn" href="ichinohata.html">&#128222; 架電リスト</a>
    <button class="navbtn" id="logout-btn">ログアウト</button>
  </header>
  <div id="wrap">
    <div id="map"></div>
    <div class="panel" id="legend"></div>
    <div id="err"><div class="box" id="errmsg"></div></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
let STORES = [];
const SUPABASE_URL='https://prldqlylkqrbwduybcpw.supabase.co';
const SUPABASE_KEY='sb_publishable_YQFRvwddrR0_8Bgmn2EZ_g_zNOHZ74V';
const PHOTO_BUCKET='store-photos';
function photoUrl(id){return SUPABASE_URL+'/storage/v1/object/public/'+PHOTO_BUCKET+'/'+id+'.jpg';}
const CATS = {
  '本社':    {color:'#6b3fa0', group:'自社のお店（RM）', shape:'castle-big', label:'本社'},
  '支店':    {color:'#1f3a6e', group:'自社のお店（RM）', shape:'castle',     label:'支店'},
  'ショップ':{color:'#2e7d32', group:'自社のお店（RM）', shape:'shop',       label:'ショップ'},
  '両方OK':  {color:'#1565c0', group:'提携先のお店（FS）', shape:'pennant',   label:'両方OK'},
  '来店のみ':{color:'#f4b400', group:'提携先のお店（FS）', shape:'pennant',   label:'来店のみ'},
  '両方NG':  {color:'#c62828', group:'提携先のお店（FS）', shape:'pennant',   label:'両方NG'},
  '架電合意':{color:'#e7a99e', group:'一の旗（架電連動）', shape:'nobori',    label:'取引合意（薄い旗）'},
  '架電開店':{color:'#c0392b', group:'一の旗（架電連動）', shape:'nobori',    label:'新店オープン（朱の旗）'}
};
const CAT_ORDER = ['本社','支店','ショップ','両方OK','来店のみ','両方NG','架電合意','架電開店'];
const GROUPS = ['自社のお店（RM）','提携先のお店（FS）','一の旗（架電連動）'];
const FLAG_STATUSES = ['取引合意','書類準備中','締結','新設届出中','新店オープン'];
const STROKE='#2b2b2b';
function enc(svg){return 'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg);}
function wrap(w,h,inner){return '<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">'+inner+'</svg>';}
function pennantInner(c){return '<line x1="7" y1="5" x2="7" y2="34" stroke="'+STROKE+'" stroke-width="2.4" stroke-linecap="round"/><path d="M7 6 L25 11 L7 16.5 Z" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.3" stroke-linejoin="round"/><circle cx="7" cy="34" r="2.6" fill="'+STROKE+'"/>';}
function shopInner(c){return '<line x1="7" y1="5" x2="7" y2="34" stroke="'+STROKE+'" stroke-width="2.4" stroke-linecap="round"/><path d="M7 6 L24 6 L19.5 11 L24 16 L7 16 Z" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.3" stroke-linejoin="round"/><circle cx="7" cy="34" r="2.6" fill="'+STROKE+'"/>';}
function noboriInner(c){return '<line x1="6" y1="3" x2="6" y2="37" stroke="'+STROKE+'" stroke-width="2.4" stroke-linecap="round"/><path d="M6 4 L21 4 L21 25 L6 25 Z" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.2" stroke-linejoin="round"/><circle cx="6" cy="3" r="2.3" fill="#d4af37" stroke="'+STROKE+'" stroke-width="0.8"/><circle cx="6" cy="37" r="2.5" fill="'+STROKE+'"/>';}
function castleInner(c){return '<path d="M5 34 L25 34 L22 28 L8 28 Z" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.2" stroke-linejoin="round"/><rect x="9" y="21.5" width="12" height="6.7" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.1"/><path d="M5 22.5 L15 15.5 L25 22.5 Z" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.1" stroke-linejoin="round"/><rect x="11.7" y="12" width="6.6" height="4.5" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.1"/><path d="M8.5 13 L15 7.8 L21.5 13 Z" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.1" stroke-linejoin="round"/><rect x="14.2" y="5.5" width="1.6" height="2.6" fill="'+STROKE+'"/>';}
function bigCastleInner(c){return '<path d="M3 40 L29 40 L26 33 L6 33 Z" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.3" stroke-linejoin="round"/><rect x="7.5" y="26" width="17" height="7" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.2"/><path d="M3.5 27 L16 19.5 L28.5 27 Z" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.2" stroke-linejoin="round"/><rect x="10" y="15.5" width="12" height="5.5" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.2"/><path d="M6.5 16.5 L16 10 L25.5 16.5 Z" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.2" stroke-linejoin="round"/><rect x="12.5" y="7" width="7" height="3.8" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.1"/><path d="M9.5 7.8 L16 2.8 L22.5 7.8 Z" fill="'+c+'" stroke="'+STROKE+'" stroke-width="1.1" stroke-linejoin="round"/><rect x="15.2" y="0.6" width="1.7" height="2.6" fill="#d4af37"/>';}
function innerFor(shape,color){
  if(shape==='castle-big') return wrap(32,42,bigCastleInner(color));
  if(shape==='castle')     return wrap(30,38,castleInner(color));
  if(shape==='shop')       return wrap(30,38,shopInner(color));
  if(shape==='nobori')     return wrap(28,40,noboriInner(color));
  return wrap(30,38,pennantInner(color));
}
function shapeSVG(cat){ var d=CATS[cat]||{shape:'pennant',color:'#888'}; return innerFor(d.shape, d.color); }
function iconFor(cat){
  var d=CATS[cat]||{shape:'pennant',color:'#888'}; var c=d.color;
  if(d.shape==='castle-big') return {url:enc(wrap(32,42,bigCastleInner(c))),scaledSize:new google.maps.Size(37,48),anchor:new google.maps.Point(18.5,45.7)};
  if(d.shape==='castle')     return {url:enc(wrap(30,38,castleInner(c))),   scaledSize:new google.maps.Size(30,38),anchor:new google.maps.Point(15,34)};
  if(d.shape==='shop')       return {url:enc(wrap(30,38,shopInner(c))),     scaledSize:new google.maps.Size(30,38),anchor:new google.maps.Point(7,34)};
  if(d.shape==='nobori')     return {url:enc(wrap(28,40,noboriInner(c))),   scaledSize:new google.maps.Size(31,44),anchor:new google.maps.Point(6.6,44)};
  return {url:enc(wrap(30,38,pennantInner(c))),scaledSize:new google.maps.Size(30,38),anchor:new google.maps.Point(7,34)};
}
function esc(t){return (t||'').replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]);});}
let map, info, markersByCat={}, shown={};
CAT_ORDER.forEach(function(c){shown[c]=true;});
function initMap(){
  map=new google.maps.Map(document.getElementById('map'),{center:{lat:37.8,lng:137.5},zoom:5,mapTypeControl:true,streetViewControl:false,fullscreenControl:true,gestureHandling:'greedy'});
  info=new google.maps.InfoWindow();
  var bounds=new google.maps.LatLngBounds();
  CAT_ORDER.forEach(function(c){markersByCat[c]=[];});
  STORES.forEach(function(s){
    var m=new google.maps.Marker({position:{lat:s.lat,lng:s.lng},map:map,title:s.name,icon:iconFor(s.cat)});
    m.addListener('click',function(){info.setContent(infoHTML(s));info.open(map,m);});
    (markersByCat[s.cat]||(markersByCat[s.cat]=[])).push(m);
    bounds.extend(m.getPosition());
  });
  if(!bounds.isEmpty()) map.fitBounds(bounds);
  buildLegend();
  document.getElementById('total').textContent='全 '+STORES.length+' 店舗';
  loadFlags();
}
function buildAddress(s){
  var pref=(s.pref||'').trim(), city=(s.city||'').trim(), addr=(s.address||'').trim();
  if(!addr){ return esc([pref,city].filter(Boolean).join('')); }
  if(pref && addr.indexOf(pref)===0){ return esc(addr); }
  if(city && addr.indexOf(city)===0){ return esc(pref+addr); }
  return esc(pref+city+addr);
}
function infoHTML(s){
  var c=CATS[s.cat]||{color:'#888'};
  var region=buildAddress(s);
  var meta='';
  if(s.group==='FS'){
    var ok='◯〇○';
    var rOK=(ok.indexOf((s.raiten||'').trim())>=0);
    var sOK=(ok.indexOf((s.shutcho||'').trim())>=0);
    meta='<div class="iw-meta">来店買取：'+(rOK?'◯':esc(s.raiten)||'✕')+'　／　出張所：'+(sOK?'◯':esc(s.shutcho)||'✕')+'</div>';
    // この旗の功績（既存FS店：開拓担当・旗の日）
    var deeds='';
    function deed(html){ deeds+='<div class="iw-deed">'+html+'</div>'; }
    if(s.apo_tanto) deed('🚩 開拓担当：<b>'+esc(s.apo_tanto)+'</b>');
    if(s.flag_date) deed('📅 旗が立った日：'+esc(s.flag_date));
    if(s.web_date) deed('🌐 WEB公開：'+esc(s.web_date));
    if(deeds){ meta+='<div class="iw-deeds"><div class="iw-deeds-h">この旗の功績</div>'+deeds+'</div>'; }
  } else {
    meta='<div class="iw-meta"><b>自社店舗（'+esc(s.cat)+'）</b></div>';
  }
  var photo='<img class="iw-photo" src="'+photoUrl(s.photo_id)+'" onerror="this.style.display=\'none\'" alt="">';
  return '<div class="iw"><span class="iw-cat" style="background:'+c.color+'">'+esc(s.cat)+'</span>'
    +'<div class="iw-name">'+esc(s.name)+'</div><div class="iw-pref">'+region+'</div>'
    +(s.company?'<div class="iw-co">'+esc(s.company)+'</div>':'')+meta+photo+'</div>';
}
function flagInfoHTML(p,cat){
  var d=CATS[cat]; var label=(cat==='架電開店')?'新店オープン':'取引合意';
  var region=[p.prefecture,p.city].filter(Boolean).join(' ');
  // 「この旗の功績」を組み立てる（中身があるものだけ表示）
  var deeds='';
  function deed(html){ deeds+='<div class="iw-deed">'+html+'</div>'; }
  if(p.referrer) deed('🤝 紹介：'+esc(p.referrer));
  if(p.send_staff) deed('📞 資料請求・送付：<b>'+esc(p.send_staff)+'</b>'+(p.send_date?'<span class="iw-sub">（発送 '+esc(p.send_date)+'）</span>':''));
  if(p.staff) deed('⚔️ アタック：'+esc(p.staff));
  if(p.contract_staff) deed('✍️ 締結：<b>'+esc(p.contract_staff)+'</b>'+(p.contract_date?'<span class="iw-sub">（締結 '+esc(p.contract_date)+'）</span>':''));
  if(p.flag_date) deed('🚩 旗の日：'+esc(p.flag_date));
  if(p.open_date) deed('🎉 新店オープン：'+esc(p.open_date));
  var deedBox = deeds ? '<div class="iw-deeds"><div class="iw-deeds-h">この旗の功績</div>'+deeds+'</div>' : '';
  return '<div class="iw"><span class="iw-cat" style="background:'+d.color+';color:#3a1a14;border:1px solid #2b2b2b">&#9730; '+esc(label)+'</span>'
    +'<div class="iw-name">'+esc(p.company||'（会社名なし）')+'</div>'
    +'<div class="iw-pref">'+esc(region)+'</div>'
    +'<div class="iw-meta">状況：'+esc(p.status)+'</div>'
    +deedBox+'</div>';
}
function buildLegend(){
  var counts={}; CAT_ORDER.forEach(function(c){counts[c]=(markersByCat[c]||[]).length;});
  var html='<h2>凡例（クリックで表示の切替）</h2>';
  GROUPS.forEach(function(g){
    html+='<div class="grp"><div class="gl">'+g+'</div>';
    CAT_ORDER.filter(function(c){return CATS[c].group===g;}).forEach(function(c){
      html+='<div class="leg'+(shown[c]?'':' off')+'" data-cat="'+c+'"><img class="sw" src="'+enc(shapeSVG(c))+'"><span class="nm">'+CATS[c].label+'</span><span class="ct">'+(counts[c]||0)+'</span></div>';
    });
    html+='</div>';
  });
  var el=document.getElementById('legend'); el.innerHTML=html;
  el.querySelectorAll('.leg').forEach(function(row){
    row.addEventListener('click',function(){
      var c=row.dataset.cat; shown[c]=!shown[c]; row.classList.toggle('off',!shown[c]);
      (markersByCat[c]||[]).forEach(function(m){m.setMap(shown[c]?map:null);});
    });
  });
}
function flagCat(status){ return status==='新店オープン' ? '架電開店' : '架電合意'; }
function geocodeOne(geocoder, addr){
  return new Promise(function(resolve){
    geocoder.geocode({address:addr, region:'JP'}, function(results,status){
      if(status==='OK' && results && results[0]){ var l=results[0].geometry.location; resolve({lat:l.lat(), lng:l.lng()}); }
      else { resolve(null); }
    });
  });
}
function sleep(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }
async function loadFlags(){
  if(!sb) return;
  try{
    var res = await sb.from('ichinohata').select('id,company,prefecture,city,address,status,referrer,staff,send_staff,send_date,contract_staff,contract_date,flag_date,open_date').in('status', FLAG_STATUSES);
    if(res.error || !res.data){ return; }
    var geocoder = new google.maps.Geocoder();
    for(var i=0;i<res.data.length;i++){
      var p=res.data[i];
      var addr=[p.address,p.prefecture,p.city,p.company].filter(Boolean).join(' ');
      if(!addr) continue;
      var key='ichgeo:'+addr, pos=null, wasCached=false;
      try{ var cv=localStorage.getItem(key); if(cv){ pos=JSON.parse(cv); wasCached=true; } }catch(e){}
      if(!pos){ pos=await geocodeOne(geocoder, addr); if(pos){ try{ localStorage.setItem(key, JSON.stringify(pos)); }catch(e){} } }
      if(!pos){ continue; }
      var cat=flagCat(p.status);
      var m=new google.maps.Marker({position:pos, map:(shown[cat]?map:null), title:(p.company||''), icon:iconFor(cat)});
      (function(pp,cc,mk){ mk.addListener('click',function(){ info.setContent(flagInfoHTML(pp,cc)); info.open(map,mk); }); })(p,cat,m);
      (markersByCat[cat]||(markersByCat[cat]=[])).push(m);
      if(!wasCached){ await sleep(160); }
    }
    buildLegend();
  }catch(e){ /* 旗の読み込み失敗でも基本地図は動く */ }
}
function gmapsError(){
  document.getElementById('err').style.display='flex';
  document.getElementById('errmsg').innerHTML='<b>地図を読み込めませんでした。</b><br>APIキーの設定（Maps JavaScript API の有効化、サイトの制限）をご確認ください。';
}
window.gm_authFailure=gmapsError;

/* ===== ログイン制御（チーム専用） ===== */
let sb=null, mapsReady=false, appShown=false, started=false, storesLoaded=false;
async function loadStores(){
  try{
    var res = await sb.from('stores').select('*').eq('active', true);
    if(res.error || !res.data){ STORES=[]; storesLoaded=true; return; }
    STORES = res.data.map(function(r){
      return {
        id:        's'+r.id,
        dbid:      r.id,
        photo_id:  r.photo_id || ('s'+r.id),
        group:     r.group_type,
        cat:       r.cat,
        name:      r.name,
        pref:      r.pref || '',
        city:      r.city || '',
        address:   r.address || '',
        lat:       Number(r.lat),
        lng:       Number(r.lng),
        raiten:    r.raiten || '',
        shutcho:   r.shutcho || '',
        company:   r.company || '',
        apo_tanto: r.apo_tanto || '',
        flag_date: r.flag_date || '',
        web_date:  r.web_date || '',
        code:      ''
      };
    }).filter(function(s){ return !isNaN(s.lat) && !isNaN(s.lng); });
  }catch(e){ STORES=[]; }
  storesLoaded=true;
}
function onMapsReady(){ mapsReady=true; maybeStart(); }
async function maybeStart(){
  if(mapsReady && appShown && !started){
    started=true;
    if(!storesLoaded){ await loadStores(); }
    initMap();
  }
}
function showApp(){ document.getElementById('login-overlay').classList.add('hidden'); appShown=true; maybeStart(); }
function showLogin(){ document.getElementById('login-overlay').classList.remove('hidden'); }
async function doLogin(){
  var email=(document.getElementById('login-email').value||'').trim();
  var pass=document.getElementById('login-pass').value||'';
  var errEl=document.getElementById('login-error'); errEl.textContent='';
  if(!email||!pass){ errEl.textContent='メールとパスワードを入れてください'; return; }
  var btn=document.getElementById('login-btn'); btn.disabled=true; btn.textContent='ログイン中…';
  var res=await sb.auth.signInWithPassword({email:email,password:pass});
  btn.disabled=false; btn.textContent='ログイン';
  if(res.error){ errEl.textContent='ログインできませんでした（メール・パスワードをご確認ください）'; return; }
  document.getElementById('login-pass').value=''; showApp();
}
window.addEventListener('DOMContentLoaded', async function(){
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('login-pass').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  document.getElementById('logout-btn').addEventListener('click', async function(){ await sb.auth.signOut(); location.reload(); });
  try{
    var s=await sb.auth.getSession();
    if(s && s.data && s.data.session){ showApp(); } else { showLogin(); }
  }catch(e){ showLogin(); }
});
</script>
<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAQZ0VifKMGOsahGQgPv02fvlCZusCABk8&callback=onMapsReady&loading=async" onerror="gmapsError()"></script>
